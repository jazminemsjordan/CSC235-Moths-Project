<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="style.css">
    <title>CSC235 Moths Project</title>
    <script src="d3.v7.min.js"></script>

</head>
    <h1> [placeholder]</h1>
<body>
    <div id="tooltip" style="
        position: absolute;
        opacity: 0;
        background: white;
        border: 1px solid #ccc;
        padding: 6px;
        pointer-events: none;
        font-size: 12px;
    "></div>

        <div id="bar_chart">
        
    </div>
    <div id="bar_label">
        <label for="xSelect">X-axis:</label>
        <select name="x-axis" id="xSelect">
            <option value="biomass">Biomass</option>
            <option value="speciesRichness">Species Richness</option>
            <option value="abundance">Abundance</option>
        </select>
    </div>
    <div id = "legend">
    </div>
    <div id="vis2">
        <div id="scatterplot_container">
            <svg id="scatterplot" width="960" height="660">
                <g id="points"></g>
                <g id="xaxis"></g>
                <g id="yaxis"></g>
                <g id="legendviz" height=110 width=150 transform="translate(800, 0)"></g>
            </svg>
        </div>
        <div id="piechart_container">
            <svg id="pie_chart" height="300" width="300">
                <g id="arcs" transform="translate(150, 150)"></g>
                <p id="pie_title"></p>
            </svg>
        </div>
    </div>
<script src="index.js" type="module"></script>
</body>
</html>
